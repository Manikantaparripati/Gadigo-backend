services:
  - type: web
    name: gadigo-backend
    env: java
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_DATA_MONGODB_URI
        sync: false
      - key: GADIGO_APP_JWT_SECRET
        generateValue: true
      - key: GADIGO_APP_JWT_EXPIRATIONS_MS
        value: 86400000
